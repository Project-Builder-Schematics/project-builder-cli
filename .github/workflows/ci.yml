name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled, unlabeled]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: detect go files
        id: detect
        run: |
          count=$(find cmd internal -name '*.go' 2>/dev/null | wc -l)
          echo "count=${count}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.count != '0'
        with:
          go-version: '1.23'

      - uses: golangci/golangci-lint-action@v7
        if: steps.detect.outputs.count != '0'
        with:
          version: v2.12.2

      - name: lint skipped (empty source)
        if: steps.detect.outputs.count == '0'
        run: echo "no .go files yet — lint job is a no-op"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: extractions/setup-just@v2

      - name: just test
        run: just test

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: extractions/setup-just@v2

      - name: just build
        run: just build

  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: extractions/setup-just@v2

      - name: architectural (linter bundle = 15 curated tools)
        run: |
          set -euo pipefail
          want=(errcheck gocyclo gosec govet ineffassign misspell revive staticcheck unconvert unparam unused bodyclose contextcheck gofumpt goimports)
          got=$( { yq '.linters.enable[]' .golangci.yml; yq '.formatters.enable[]' .golangci.yml; } | sort -u )
          want_sorted=$(printf "%s\n" "${want[@]}" | sort -u)
          if [ "${got}" != "${want_sorted}" ]; then
            echo "linter bundle drift!"
            diff <(echo "${want_sorted}") <(echo "${got}") || true
            exit 1
          fi
          echo "linter bundle: 15 tools as specified"

      - name: architectural (single Go version source of truth)
        run: |
          set -euo pipefail
          if [ -f .go-version ] || [ -f .tool-versions ]; then
            echo "REQ-01.2 violated: alternative Go version file present"
            exit 1
          fi
          echo "single-source: go.mod only"

      - name: smoke (just fmt idempotency)
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.10.0
          go install golang.org/x/tools/cmd/goimports@v0.45.0
          export PATH="$(go env GOPATH)/bin:${PATH}"
          just fmt
          just fmt
          git diff --exit-code || { echo "just fmt not idempotent"; exit 1; }
          echo "fmt: idempotent"

      - name: architectural (no unpinned uses in workflows)
        run: |
          set -euo pipefail
          if grep -rnE '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*[^#]*@latest' .github/workflows/; then
            echo "REQ-03.1 violated: uses entry pointing at @latest"
            exit 1
          fi
          echo "version-pin: all uses entries pinned to major version"

  fitness:
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: extractions/setup-just@v2

      - name: fitness (all 13 functions against real codebase)
        run: just fitness

      - name: fitness-meta (each function catches its bad-pattern fixture)
        run: just fitness-meta

  bump-label-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Validate exactly one bump label
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          bump_count=$(printf '%s' "$LABELS_JSON" | jq '[.[] | select(.name == "bump:minor" or .name == "bump:patch")] | length')
          if [ "$bump_count" -eq 0 ]; then
            echo "::error::PR must have exactly one of bump:minor or bump:patch labels. Found: 0. Add the appropriate label per the project's bump policy."
            exit 1
          fi
          if [ "$bump_count" -eq 2 ]; then
            echo "::error::PR cannot have both bump:minor and bump:patch labels. Choose one per the project's bump policy — they are mutually exclusive."
            exit 1
          fi
          echo "Exactly one bump label found. OK."
