name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: extractions/setup-just@v2

      - name: just build
        run: just build

      - name: smoke (layout invariants)
        run: |
          set -euo pipefail
          dirs=(
            cmd/builder
            internal/features
            internal/shared/services
            internal/shared/discoverer
            internal/shared/inputs
            internal/shared/engine
            internal/shared/render
            internal/shared/events
            internal/shared/errors
            internal/shared/config
            internal/shared/log
          )
          for d in "${dirs[@]}"; do
            test -f "${d}/.gitkeep" || { echo "missing ${d}/.gitkeep"; exit 1; }
          done
          go_files=$(find cmd internal -name '*.go' 2>/dev/null | wc -l)
          if [ "${go_files}" -ne 0 ]; then
            echo "expected 0 *.go files under cmd/ or internal/, found ${go_files}"
            exit 1
          fi
          echo "layout smoke: 11 placeholder dirs present, 0 *.go files"

      - name: architectural (linter bundle = 15 curated tools)
        run: |
          set -euo pipefail
          # Spec REQ-04: 13 linters + 2 formatters = 15 (gofumpt + goimports
          # are formatters in golangci-lint v2).
          want=(errcheck gocyclo gosec govet ineffassign misspell revive staticcheck unconvert unparam unused bodyclose contextcheck gofumpt goimports)
          got=$( { yq '.linters.enable[]' .golangci.yml; yq '.formatters.enable[]' .golangci.yml; } | sort -u )
          want_sorted=$(printf "%s\n" "${want[@]}" | sort -u)
          if [ "${got}" != "${want_sorted}" ]; then
            echo "linter bundle drift!"
            diff <(echo "${want_sorted}") <(echo "${got}") || true
            exit 1
          fi
          echo "linter bundle: 15 tools as specified"

      - name: architectural (single Go version source of truth)
        run: |
          set -euo pipefail
          if [ -f .go-version ] || [ -f .tool-versions ]; then
            echo "REQ-01.2 violated: alternative Go version file present"
            exit 1
          fi
          echo "single-source: go.mod only"

      - name: smoke (just fmt idempotency)
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.10.0
          go install golang.org/x/tools/cmd/goimports@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          just fmt
          just fmt
          git diff --exit-code || { echo "just fmt not idempotent"; exit 1; }
          echo "fmt: idempotent"

      - name: smoke (release.yml deferred stub)
        run: |
          set -euo pipefail
          grep -E '^# DEFERRED.*see issue #[0-9]+' .github/workflows/release.yml \
            || { echo "release.yml missing DEFERRED comment with issue ref"; exit 1; }
          echo "release.yml: deferred stub OK"
